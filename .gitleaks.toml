[allowlist]
description = "WealthGenie Allowlist"

# Allow example/template env files
paths = [
  '''.env\.example$''',
]

[[rules]]
id = "mongodb-connection-string"
description = "MongoDB Connection String"
regex = '''mongodb\+srv://[^"'\s]+'''
tags = ["database", "mongodb"]

[[rules]]
id = "generic-api-key"
description = "Generic API Key"
regex = '''(?i)(?:api[_-]?key|apikey)\s*[=:]\s*['"][A-Za-z0-9_\-]{20,}['"]'''
tags = ["api", "key"]

[[rules]]
id = "jwt-secret"
description = "JWT Secret in Code"
regex = '''(?i)jwt[_-]?secret\s*[=:]\s*['"][^'"]{16,}['"]'''
tags = ["jwt", "secret"]

[[rules]]
id = "redis-connection-string"
description = "Redis Connection String"
regex = '''rediss?://[^"'\s]+'''
tags = ["database", "redis"]
