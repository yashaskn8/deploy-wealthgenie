name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            reactapp/package-lock.json

      - name: Verify Investment Data Artifacts
        run: |
          node scripts/sync_data.js --check
          node scripts/validate_investments.js

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml-service/requirements.txt

      - name: Install Backend Dependencies
        run: |
          cd server
          npm ci

      - name: Install Frontend Dependencies
        run: |
          cd reactapp
          npm ci

      - name: Install ML Service Dependencies
        run: |
          cd ml-service
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Frontend Linter
        run: |
          cd reactapp
          npm run lint

      - name: Run Backend Typecheck
        run: |
          cd server
          npm run typecheck

      - name: Run Frontend Typecheck
        run: |
          cd reactapp
          npm run typecheck

      - name: Run Frontend Tests
        run: |
          cd reactapp
          npm run test

      - name: Run Backend Tests
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/wealthgenie
          REDIS_URL: redis://127.0.0.1:6379
          JWT_SECRET: testing_jwt_secret_must_be_at_least_32_characters
          NODE_ENV: test
        run: |
          cd server
          npm run test

      - name: Run ML Service Tests
        env:
          PYTHONPATH: .
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          cd ml-service
          python -m pytest

      - name: Build Frontend
        run: |
          cd reactapp
          npm run build

  verify-docker:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Docker Build Context Data
        run: node scripts/sync_data.js --check

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Express Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: false
          tags: wealthgenie-server:latest

      - name: Build FastAPI ML Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          file: ./ml-service/Dockerfile
          push: false
          tags: wealthgenie-ml-service:latest

      - name: Build React Nginx Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./reactapp
          file: ./reactapp/Dockerfile
          push: false
          tags: wealthgenie-reactapp:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test, verify-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy API Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service wealthgenie-server --detach
        continue-on-error: false

      - name: Deploy ML Microservice to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up --service wealthgenie-ml-service --detach
        continue-on-error: false

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Deploy Frontend to Vercel
        working-directory: reactapp
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}

      - name: Wait for service startup
        run: sleep 15

      - name: Check Backend Liveness / Live Health Check
        run: |
          curl -f -s https://wealthgenie-production.up.railway.app/live || (echo "Backend liveness probe failed!" && exit 1)

      - name: Check Backend Readiness / DB Connectivity Health Check
        run: |
          curl -f -s https://wealthgenie-production.up.railway.app/ready || (echo "Backend readiness probe failed!" && exit 1)
